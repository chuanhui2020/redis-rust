<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redis Commands Reference | Redis 命令参考</title>
<style>
  :root {
    --bg-primary: #0d1117;
    --bg-secondary: #161b22;
    --bg-tertiary: #21262d;
    --border-color: #30363d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --accent-blue: #58a6ff;
    --accent-purple: #a371f7;
    --accent-cyan: #39c5cf;
    --accent-green: #3fb950;
    --accent-orange: #d29922;
    --accent-red: #f85149;
    --glow-blue: rgba(88, 166, 255, 0.15);
    --glow-purple: rgba(163, 113, 247, 0.15);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.6;
    overflow-x: hidden;
  }
  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg-primary); }
  ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent-blue); }

  /* Layout */
  .container {
    display: flex;
    min-height: 100vh;
  }
  /* Sidebar */
  .sidebar {
    width: 260px;
    background: var(--bg-secondary);
    border-right: 1px solid var(--border-color);
    position: fixed;
    top: 0; left: 0; bottom: 0;
    overflow-y: auto;
    z-index: 100;
    transition: transform 0.3s ease;
  }
  .sidebar-header {
    padding: 24px 20px;
    border-bottom: 1px solid var(--border-color);
  }
  .sidebar-header h1 {
    font-size: 1.3rem;
    background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .sidebar-header p {
    font-size: 0.75rem;
    color: var(--text-secondary);
    margin-top: 4px;
  }
  .nav-menu {
    list-style: none;
    padding: 12px 0;
  }
  .nav-item a {
    display: block;
    padding: 10px 24px;
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 0.9rem;
    border-left: 3px solid transparent;
    transition: all 0.2s ease;
    cursor: pointer;
  }
  .nav-item a:hover, .nav-item a.active {
    color: var(--text-primary);
    background: var(--bg-tertiary);
    border-left-color: var(--accent-blue);
  }
  .nav-item a.active {
    background: linear-gradient(90deg, rgba(88,166,255,0.1), transparent);
  }
  .nav-count {
    float: right;
    font-size: 0.75rem;
    color: var(--accent-cyan);
    background: rgba(57,197,207,0.1);
    padding: 1px 6px;
    border-radius: 10px;
  }

  /* Mobile toggle */
  .mobile-toggle {
    display: none;
    position: fixed;
    top: 16px; left: 16px;
    z-index: 200;
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    color: var(--text-primary);
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1.2rem;
  }

  /* Main */
  .main {
    margin-left: 260px;
    flex: 1;
    padding: 40px 48px;
    max-width: 1200px;
  }
  /* Header */
  .page-header {
    margin-bottom: 32px;
  }
  .page-header h2 {
    font-size: 2rem;
    margin-bottom: 8px;
    background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple), var(--accent-cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .page-header p {
    color: var(--text-secondary);
    font-size: 1rem;
  }

  /* Search */
  .search-box {
    position: relative;
    margin-bottom: 40px;
  }
  .search-box input {
    width: 100%;
    padding: 14px 20px 14px 48px;
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    color: var(--text-primary);
    font-size: 1rem;
    outline: none;
    transition: all 0.3s ease;
  }
  .search-box input:focus {
    border-color: var(--accent-blue);
    box-shadow: 0 0 20px var(--glow-blue);
  }
  .search-box::before {
    content: "🔍";
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1rem;
    opacity: 0.6;
  }
  .search-stats {
    margin-top: 8px;
    font-size: 0.85rem;
    color: var(--text-secondary);
  }

  /* Category section */
  .category {
    margin-bottom: 48px;
    scroll-margin-top: 24px;
  }
  .category-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border-color);
  }
  .category-header h3 {
    font-size: 1.4rem;
    color: var(--accent-cyan);
  }
  .category-count {
    font-size: 0.8rem;
    color: var(--text-secondary);
    background: var(--bg-tertiary);
    padding: 2px 10px;
    border-radius: 12px;
    border: 1px solid var(--border-color);
  }

  /* Grid */
  .command-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }

  /* Card */
  .command-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    overflow: hidden;
    transition: all 0.3s ease;
    cursor: pointer;
  }
  .command-card:hover {
    border-color: var(--accent-blue);
    box-shadow: 0 0 24px var(--glow-blue), inset 0 0 0 1px rgba(88,166,255,0.2);
    transform: translateY(-2px);
  }
  .command-card.collapsed .card-body {
    display: none;
  }
  .card-header {
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .command-name {
    font-family: "SF Mono", Monaco, "Cascadia Code", "Roboto Mono", Consolas, "Courier New", monospace;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--accent-blue);
    letter-spacing: 0.02em;
  }
  .card-toggle {
    color: var(--text-secondary);
    font-size: 0.8rem;
    transition: transform 0.3s ease;
  }
  .command-card.collapsed .card-toggle {
    transform: rotate(-90deg);
  }
  .card-body {
    padding: 0 20px 20px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .syntax-box {
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 12px 14px;
    font-family: "SF Mono", Monaco, "Cascadia Code", "Roboto Mono", Consolas, "Courier New", monospace;
    font-size: 0.82rem;
    color: var(--accent-orange);
    margin-bottom: 12px;
    word-break: break-word;
    line-height: 1.5;
  }
  .desc-cn, .desc-en {
    font-size: 0.88rem;
    margin-bottom: 10px;
    color: var(--text-primary);
  }
  .desc-en {
    color: var(--text-secondary);
    font-style: italic;
    border-left: 2px solid var(--accent-purple);
    padding-left: 10px;
  }
  .meta-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border-color);
  }
  .meta-item {
    font-size: 0.8rem;
  }
  .meta-label {
    color: var(--text-secondary);
    margin-right: 4px;
  }
  .meta-value {
    color: var(--accent-green);
    font-family: "SF Mono", Monaco, "Cascadia Code", "Roboto Mono", Consolas, "Courier New", monospace;
  }
  .return-box {
    margin-top: 10px;
    font-size: 0.82rem;
    background: rgba(57,197,207,0.05);
    border-radius: 6px;
    padding: 10px 12px;
  }
  .return-cn { color: var(--accent-cyan); }
  .return-en { color: var(--text-secondary); margin-top: 4px; }

  /* Responsive */
  @media (max-width: 900px) {
    .sidebar {
      transform: translateX(-100%);
    }
    .sidebar.open {
      transform: translateX(0);
    }
    .mobile-toggle {
      display: block;
    }
    .main {
      margin-left: 0;
      padding: 60px 20px 40px;
    }
    .command-grid {
      grid-template-columns: 1fr;
    }
    .page-header h2 {
      font-size: 1.5rem;
    }
  }
  @media (max-width: 600px) {
    .main { padding: 60px 14px 30px; }
    .command-grid { gap: 12px; }
  }

  /* Overlay for mobile sidebar */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 99;
  }
  @media (max-width: 900px) {
    .overlay.show { display: block; }
  }

  /* No results */
  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
  }
  .no-results h3 {
    color: var(--accent-blue);
    margin-bottom: 8px;
  }

  /* Back to top */
  .back-to-top {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    color: var(--accent-blue);
    width: 44px; height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 50;
    font-size: 1.2rem;
  }
  .back-to-top.visible {
    opacity: 1;
  }
  .back-to-top:hover {
    transform: translateY(-2px);
    border-color: var(--accent-blue);
    box-shadow: 0 0 16px var(--glow-blue);
  }
</style>
</head>
<body>
<button class="mobile-toggle" onclick="toggleSidebar()">☰</button>
<div class="overlay" onclick="toggleSidebar()"></div>

<div class="container">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>Redis Commands</h1>
      <p>282 Commands Reference</p>
    </div>
    <ul class="nav-menu" id="navMenu"></ul>
  </aside>

  <main class="main">
    <div class="page-header">
      <h2>Redis 命令参考文档</h2>
      <p>Redis Commands Reference — Complete documentation for all 282 commands</p>
    </div>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索命令名称或描述 / Search command name or description..." autocomplete="off">
      <div class="search-stats" id="searchStats"></div>
    </div>

    <div id="content"></div>
  </main>
</div>

<button class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
const categories = [
  {
    name: "String",
    commands: [
      { name: "GET", syntax: "GET key", cn: "获取指定键的字符串值。", en: "Get the value of a key.", complexity: "O(1)", returnCn: "键的值；若键不存在返回 nil", returnEn: "The value of the key, or nil if the key does not exist." },
      { name: "SET", syntax: "SET key value [NX|XX] [GET] [EX seconds|PX milliseconds|EXAT timestamp|PXAT ms-timestamp|KEEPTTL]", cn: "设置键值对。支持条件设置（NX/XX）、获取旧值（GET）和多种过期选项。", en: "Set the string value of a key. Supports conditional set (NX/XX), get old value (GET), and various expiration options.", complexity: "O(1)", returnCn: "OK（成功）/ nil（NX/XX 条件不满足）/ 旧值（GET 选项）", returnEn: "OK on success / nil if NX/XX condition not met / old value with GET option" },
      { name: "MGET", syntax: "MGET key [key ...]", cn: "返回所有给定键的值。", en: "Get the values of all the given keys.", complexity: "O(N)", returnCn: "值的数组；不存在的键对应 nil", returnEn: "Array of values; nil for keys that do not exist." },
      { name: "MSET", syntax: "MSET key value [key value ...]", cn: "同时设置一个或多个键值对。", en: "Set multiple keys to multiple values.", complexity: "O(N)", returnCn: "OK", returnEn: "Always OK." },
      { name: "INCR", syntax: "INCR key", cn: "将键中存储的数字值增一。", en: "Increment the integer value of a key by one.", complexity: "O(1)", returnCn: "增加后的值", returnEn: "The value of the key after increment." },
      { name: "DECR", syntax: "DECR key", cn: "将键中存储的数字值减一。", en: "Decrement the integer value of a key by one.", complexity: "O(1)", returnCn: "减少后的值", returnEn: "The value of the key after decrement." },
      { name: "INCRBY", syntax: "INCRBY key increment", cn: "将键所存储的值加上给定的增量。", en: "Increment the integer value of a key by the given amount.", complexity: "O(1)", returnCn: "增加后的值", returnEn: "The value of the key after increment." },
      { name: "DECRBY", syntax: "DECRBY key decrement", cn: "将键所存储的值减去给定的减量。", en: "Decrement the integer value of a key by the given amount.", complexity: "O(1)", returnCn: "减少后的值", returnEn: "The value of the key after decrement." },
      { name: "INCRBYFLOAT", syntax: "INCRBYFLOAT key increment", cn: "将键所存储的值加上给定的浮点增量。", en: "Increment the float value of a key by the given amount.", complexity: "O(1)", returnCn: "增加后的字符串表示", returnEn: "The value of the key after increment as string." },
      { name: "APPEND", syntax: "APPEND key value", cn: "如果键已经存在并且值为字符串，则将值追加到末尾。", en: "Append a value to a key.", complexity: "O(1) amortized", returnCn: "追加后字符串的长度", returnEn: "The length of the string after append." },
      { name: "STRLEN", syntax: "STRLEN key", cn: "返回键所存储的字符串值的长度。", en: "Get the length of the value stored in a key.", complexity: "O(1)", returnCn: "字符串长度；键不存在返回 0", returnEn: "Length of the string; 0 if key does not exist." },
      { name: "SETNX", syntax: "SETNX key value", cn: "仅在键不存在时设置键的值。", en: "Set the value of a key, only if the key does not exist.", complexity: "O(1)", returnCn: "1（设置成功）/ 0（键已存在）", returnEn: "1 if the key was set, 0 if not." },
      { name: "SETEX", syntax: "SETEX key seconds value", cn: "设置键值并指定过期时间（秒）。", en: "Set the value and expiration of a key (seconds).", complexity: "O(1)", returnCn: "OK", returnEn: "OK" },
      { name: "PSETEX", syntax: "PSETEX key milliseconds value", cn: "设置键值并指定过期时间（毫秒）。", en: "Set the value and expiration of a key (milliseconds).", complexity: "O(1)", returnCn: "OK", returnEn: "OK" },
      { name: "GETSET", syntax: "GETSET key value", cn: "设置键的值并返回旧值。", en: "Set the string value of a key and return its old value.", complexity: "O(1)", returnCn: "旧值；键不存在返回 nil", returnEn: "The old value, or nil if key did not exist." },
      { name: "GETDEL", syntax: "GETDEL key", cn: "获取键的值并删除该键。", en: "Get the value of a key and delete the key.", complexity: "O(1)", returnCn: "值；键不存在返回 nil", returnEn: "The value, or nil if key does not exist." },
      { name: "GETEX", syntax: "GETEX key [EX seconds|PX milliseconds|EXAT timestamp|PXAT ms-timestamp|PERSIST]", cn: "获取键的值并可选择设置过期时间。", en: "Get the value of a key and optionally set its expiration.", complexity: "O(1)", returnCn: "值；键不存在返回 nil", returnEn: "The value, or nil if key does not exist." },
      { name: "MSETNX", syntax: "MSETNX key value [key value ...]", cn: "同时设置一个或多个键值对，仅当所有键都不存在时。", en: "Set multiple keys to multiple values, only if none of the keys exist.", complexity: "O(N)", returnCn: "1（全部设置成功）/ 0（没有设置任何键）", returnEn: "1 if all keys were set, 0 if no key was set." },
      { name: "SETRANGE", syntax: "SETRANGE key offset value", cn: "从指定偏移量开始覆盖设置字符串的一部分。", en: "Overwrite part of a string at key starting at the specified offset.", complexity: "O(1) amortized", returnCn: "修改后字符串的长度", returnEn: "The length of the string after modification." },
      { name: "GETRANGE", syntax: "GETRANGE key start end", cn: "返回键中字符串值的子串。", en: "Get a substring of the string stored at a key.", complexity: "O(N)", returnCn: "子串", returnEn: "The substring." },
      { name: "LCS", syntax: "LCS key1 key2 [LEN] [IDX] [MINMATCHLEN min-match-len] [WITHMATCHLEN]", cn: "查找两个字符串的最长公共子序列。", en: "Find the longest common subsequence between strings.", complexity: "O(N*M)", returnCn: "LCS 字符串或结构化结果", returnEn: "The LCS string or structured result." }
    ]
  },
  {
    name: "List",
    commands: [
      { name: "LPUSH", syntax: "LPUSH key element [element ...]", cn: "将一个或多个值插入到列表头部。", en: "Prepend one or multiple elements to a list.", complexity: "O(1) per element", returnCn: "列表长度", returnEn: "The length of the list after the push." },
      { name: "RPUSH", syntax: "RPUSH key element [element ...]", cn: "将一个或多个值插入到列表尾部。", en: "Append one or multiple elements to a list.", complexity: "O(1) per element", returnCn: "列表长度", returnEn: "The length of the list after the push." },
      { name: "LPUSHX", syntax: "LPUSHX key element [element ...]", cn: "仅当列表存在时，将一个或多个值插入到列表头部。", en: "Prepend elements to a list, only if the list exists.", complexity: "O(1) per element", returnCn: "列表长度；列表不存在返回 0", returnEn: "List length; 0 if list does not exist." },
      { name: "RPUSHX", syntax: "RPUSHX key element [element ...]", cn: "仅当列表存在时，将一个或多个值插入到列表尾部。", en: "Append elements to a list, only if the list exists.", complexity: "O(1) per element", returnCn: "列表长度；列表不存在返回 0", returnEn: "List length; 0 if list does not exist." },
      { name: "LPOP", syntax: "LPOP key [count]", cn: "移除并返回列表的第一个元素。", en: "Remove and get the first elements in a list.", complexity: "O(N)", returnCn: "第一个元素；键不存在返回 nil", returnEn: "The first element, or nil if key does not exist." },
      { name: "RPOP", syntax: "RPOP key [count]", cn: "移除并返回列表的最后一个元素。", en: "Remove and get the last elements in a list.", complexity: "O(N)", returnCn: "最后一个元素；键不存在返回 nil", returnEn: "The last element, or nil if key does not exist." },
      { name: "LLEN", syntax: "LLEN key", cn: "返回列表的长度。", en: "Get the length of a list.", complexity: "O(1)", returnCn: "列表长度；键不存在返回 0", returnEn: "Length of the list; 0 if key does not exist." },
      { name: "LRANGE", syntax: "LRANGE key start stop", cn: "返回列表中指定区间内的元素。", en: "Get a range of elements from a list.", complexity: "O(S+N)", returnCn: "元素数组", returnEn: "Array of elements in the specified range." },
      { name: "LINDEX", syntax: "LINDEX key index", cn: "返回列表中指定索引的元素。", en: "Get an element from a list by its index.", complexity: "O(N)", returnCn: "元素；索引越界或键不存在返回 nil", returnEn: "The element, or nil if index is out of range or key does not exist." },
      { name: "LSET", syntax: "LSET key index element", cn: "通过索引设置列表元素的值。", en: "Set the value of an element in a list by its index.", complexity: "O(N)", returnCn: "OK", returnEn: "OK" },
      { name: "LINSERT", syntax: "LINSERT key BEFORE|AFTER pivot element", cn: "在列表中的指定元素前或后插入元素。", en: "Insert an element before or after another element in a list.", complexity: "O(N)", returnCn: "列表长度； pivot 不存在返回 -1", returnEn: "List length; -1 if pivot not found." },
      { name: "LREM", syntax: "LREM key count element", cn: "从列表中移除指定数量的匹配元素。", en: "Remove elements from a list.", complexity: "O(N+M)", returnCn: "移除的元素数量", returnEn: "The number of removed elements." },
      { name: "LTRIM", syntax: "LTRIM key start stop", cn: "对列表进行修剪，只保留指定区间内的元素。", en: "Trim a list to the specified range.", complexity: "O(N)", returnCn: "OK", returnEn: "OK" },
      { name: "LPOS", syntax: "LPOS key element [RANK rank] [COUNT num-matches] [MAXLEN len]", cn: "返回列表中匹配元素的索引。", en: "Return the index of matching elements in a list.", complexity: "O(N)", returnCn: "索引或索引数组", returnEn: "Index or array of indices." },
      { name: "BLPOP", syntax: "BLPOP key [key ...] timeout", cn: "移除并返回列表的第一个元素，如果列表为空则阻塞直到超时或有元素可用。", en: "Remove and get the first element in a list, or block until one is available.", complexity: "O(1)", returnCn: "[key, element] 数组；超时时返回 nil", returnEn: "[key, element] array; nil on timeout." },

      { name: "SENTINEL IS-MASTER-DOWN-BY-ADDR", syntax: "SENTINEL IS-MASTER-DOWN-BY-ADDR ip port current-epoch runid", cn: "检查指定地址的主节点是否主观下线。", en: "Check if master is down from local Sentinel point of view.", complexity: "O(1)", returnCn: "[down_state, leader, epoch]", returnEn: "[down_state, leader, epoch] array." }
    ]
  },
  {
    name: "Cluster",
    commands: [
      { name: "CLUSTER INFO", syntax: "CLUSTER INFO", cn: "返回集群节点的信息和统计。", en: "Return information about the cluster state.", complexity: "O(1)", returnCn: "键值对信息数组", returnEn: "Array of key-value info pairs." },
      { name: "CLUSTER NODES", syntax: "CLUSTER NODES", cn: "返回集群中所有节点的配置信息。", en: "Get Cluster config for the node.", complexity: "O(N)", returnCn: "节点配置字符串", returnEn: "String of node configs." },
      { name: "CLUSTER MYID", syntax: "CLUSTER MYID", cn: "返回当前节点的集群 ID。", en: "Return the ID of the current node.", complexity: "O(1)", returnCn: "节点 ID", returnEn: "Node ID string." },
      { name: "CLUSTER SLOTS", syntax: "CLUSTER SLOTS", cn: "返回哈希槽到节点的映射信息。", en: "Return hash slot mapping to nodes.", complexity: "O(N)", returnCn: "槽映射数组", returnEn: "Array of slot ranges and node info." },
      { name: "CLUSTER SHARDS", syntax: "CLUSTER SHARDS", cn: "返回集群分片的详细信息。", en: "Return detailed shard information.", complexity: "O(N)", returnCn: "分片详情数组", returnEn: "Array of shard details." },
      { name: "CLUSTER MEET", syntax: "CLUSTER MEET ip port", cn: "将新节点加入集群。", en: "Force a node to handshake with another node.", complexity: "O(1)", returnCn: "OK", returnEn: "OK" },
      { name: "CLUSTER ADDSLOTS", syntax: "CLUSTER ADDSLOTS slot [slot ...]", cn: "将指定哈希槽分配给当前节点。", en: "Assign hash slots to current node.", complexity: "O(N)", returnCn: "OK", returnEn: "OK" },
      { name: "CLUSTER DELSLOTS", syntax: "CLUSTER DELSLOTS slot [slot ...]", cn: "从当前节点移除指定哈希槽的分配。", en: "Remove hash slots assignment from current node.", complexity: "O(N)", returnCn: "OK", returnEn: "OK" },
      { name: "CLUSTER SETSLOT", syntax: "CLUSTER SETSLOT slot IMPORTING node|MIGRATING node|NODE node|STABLE", cn: "改变哈希槽的状态。", en: "Change the state of a hash slot.", complexity: "O(1)", returnCn: "OK", returnEn: "OK" },
      { name: "CLUSTER REPLICATE", syntax: "CLUSTER REPLICATE node-id", cn: "将当前节点配置为指定主节点的从节点。", en: "Configure current node as replica of a master.", complexity: "O(1)", returnCn: "OK", returnEn: "OK" },
      { name: "CLUSTER FAILOVER", syntax: "CLUSTER FAILOVER [FORCE|TAKEOVER]", cn: "手动执行故障转移，将当前从节点提升为主节点。", en: "Forces a replica to perform manual failover.", complexity: "O(1)", returnCn: "OK", returnEn: "OK" },
      { name: "CLUSTER RESET", syntax: "CLUSTER RESET [HARD|SOFT]", cn: "重置集群节点状态。", en: "Reset a cluster node.", complexity: "O(N)", returnCn: "OK", returnEn: "OK" },
      { name: "CLUSTER KEYSLOT", syntax: "CLUSTER KEYSLOT key", cn: "返回指定键的哈希槽编号。", en: "Return the hash slot for a key.", complexity: "O(N)", returnCn: "槽编号", returnEn: "Hash slot number." },
      { name: "CLUSTER COUNTKEYSINSLOT", syntax: "CLUSTER COUNTKEYSINSLOT slot", cn: "返回指定哈希槽中键的数量。", en: "Return the number of keys in a hash slot.", complexity: "O(1)", returnCn: "键数量", returnEn: "Number of keys." },
      { name: "CLUSTER GETKEYSINSLOT", syntax: "CLUSTER GETKEYSINSLOT slot count", cn: "返回指定哈希槽中的键名。", en: "Return key names in a hash slot.", complexity: "O(N)", returnCn: "键数组", returnEn: "Array of keys." },
      { name: "CLUSTER LINKS", syntax: "CLUSTER LINKS", cn: "返回当前节点与其他节点的连接信息。", en: "Return TCP links to other nodes.", complexity: "O(N)", returnCn: "连接信息数组", returnEn: "Array of link info." },
      { name: "CLUSTER COUNTFAILUREREPORTS", syntax: "CLUSTER COUNTFAILUREREPORTS node-id", cn: "返回节点的故障报告数量。", en: "Return the number of failure reports for a node.", complexity: "O(N)", returnCn: "故障报告数量", returnEn: "Number of failure reports." },
      { name: "CLUSTER FLUSHSLOTS", syntax: "CLUSTER FLUSHSLOTS", cn: "删除当前节点分配的所有哈希槽信息。", en: "Delete all slot assignments from current node.", complexity: "O(1)", returnCn: "OK", returnEn: "OK" },
      { name: "CLUSTER SAVECONFIG", syntax: "CLUSTER SAVECONFIG", cn: "将集群配置保存到 nodes.conf 文件。", en: "Force node to save cluster state to disk.", complexity: "O(1)", returnCn: "OK", returnEn: "OK" },
      { name: "CLUSTER SET-CONFIG-EPOCH", syntax: "CLUSTER SET-CONFIG-EPOCH config-epoch", cn: "设置当前节点的配置纪元。", en: "Set the configuration epoch for a node.", complexity: "O(1)", returnCn: "OK", returnEn: "OK" },
      { name: "CLUSTER MYSHARDID", syntax: "CLUSTER MYSHARDID", cn: "返回当前节点所属分片的 ID。", en: "Return the shard ID of the current node.", complexity: "O(1)", returnCn: "分片 ID", returnEn: "Shard ID string." },
      { name: "READONLY", syntax: "READONLY", cn: "启用集群从节点的读请求。", en: "Enable read queries for a connection to a replica.", complexity: "O(1)", returnCn: "OK", returnEn: "OK" },
      { name: "READWRITE", syntax: "READWRITE", cn: "禁用集群从节点的读请求（默认）。", en: "Disable read queries for a connection to a replica.", complexity: "O(1)", returnCn: "OK", returnEn: "OK" },
      { name: "MIGRATE", syntax: "MIGRATE host port key| destination-db timeout [COPY] [REPLACE] [AUTH password] [AUTH2 username password] [KEYS key [key ...]]", cn: "将键原子性地迁移到另一个 Redis 实例。", en: "Atomically transfer a key to another Redis instance.", complexity: "O(1)", returnCn: "OK", returnEn: "OK" },
      { name: "ASKING", syntax: "ASKING", cn: "在执行后续命令前发送，允许在导入槽中执行一次命令。", en: "Allow next command on an importing slot to be executed.", complexity: "O(1)", returnCn: "OK", returnEn: "OK" }
    ]
  },
  {
    name: "Module",
    commands: [
      { name: "MODULE LIST", syntax: "MODULE LIST", cn: "返回所有已加载模块的列表。", en: "Return all loaded modules.", complexity: "O(N)", returnCn: "模块信息数组", returnEn: "Array of module info." },
      { name: "MODULE LOAD", syntax: "MODULE LOAD path [arg [arg ...]]", cn: "从指定路径加载模块。", en: "Load a module from a path.", complexity: "O(1)", returnCn: "OK 或错误", returnEn: "OK or error." },
      { name: "MODULE UNLOAD", syntax: "MODULE UNLOAD name", cn: "卸载指定名称的模块。", en: "Unload a module by name.", complexity: "O(1)", returnCn: "OK 或错误", returnEn: "OK or error." }
    ]
  }
];

// Total command count
const totalCommands = categories.reduce((sum, c) => sum + c.commands.length, 0);

// DOM refs
const navMenu = document.getElementById('navMenu');
const content = document.getElementById('content');
const searchInput = document.getElementById('searchInput');
const searchStats = document.getElementById('searchStats');
const backToTop = document.getElementById('backToTop');

// Render nav
function renderNav() {
  navMenu.innerHTML = categories.map(cat => {
    const count = cat.commands.length;
    return `<li class="nav-item"><a href="#cat-${cat.name.replace(/\s+/g, '-')}" data-target="cat-${cat.name.replace(/\s+/g, '-')}">${cat.name}<span class="nav-count">${count}</span></a></li>`;
  }).join('');
}

// Render content
function renderContent(filterText = '') {
  const lowerFilter = filterText.toLowerCase().trim();
  let visibleCount = 0;
  
  content.innerHTML = categories.map(cat => {
    const filteredCommands = lowerFilter ? cat.commands.filter(cmd => {
      return cmd.name.toLowerCase().includes(lowerFilter) ||
             cmd.cn.toLowerCase().includes(lowerFilter) ||
             cmd.en.toLowerCase().includes(lowerFilter) ||
             cat.name.toLowerCase().includes(lowerFilter);
    }) : cat.commands;
    
    if (lowerFilter && filteredCommands.length === 0) return '';
    visibleCount += filteredCommands.length;
    
    const gridHtml = filteredCommands.map(cmd => `
      <div class="command-card collapsed" data-name="${cmd.name.toLowerCase()}">
        <div class="card-header" onclick="toggleCard(this)">
          <span class="command-name">${escapeHtml(cmd.name)}</span>
          <span class="card-toggle">▼</span>
        </div>
        <div class="card-body">
          <div class="syntax-box">${escapeHtml(cmd.syntax)}</div>
          <div class="desc-cn">${escapeHtml(cmd.cn)}</div>
          <div class="desc-en">${escapeHtml(cmd.en)}</div>
          <div class="meta-row">
            <div class="meta-item"><span class="meta-label">复杂度:</span><span class="meta-value">${escapeHtml(cmd.complexity)}</span></div>
          </div>
          <div class="return-box">
            <div class="return-cn">返回值: ${escapeHtml(cmd.returnCn)}</div>
            <div class="return-en">Return: ${escapeHtml(cmd.returnEn)}</div>
          </div>
        </div>
      </div>
    `).join('');
    
    return `
      <section class="category" id="cat-${cat.name.replace(/\s+/g, '-')}">
        <div class="category-header">
          <h3>${escapeHtml(cat.name)}</h3>
          <span class="category-count">${filteredCommands.length} commands</span>
        </div>
        <div class="command-grid">
          ${gridHtml}
        </div>
      </section>
    `;
  }).join('');
  
  if (lowerFilter) {
    searchStats.textContent = `Showing ${visibleCount} of ${totalCommands} commands matching "${filterText}"`;
  } else {
    searchStats.textContent = `Total ${totalCommands} commands across ${categories.length} categories`;
  }
  
  if (visibleCount === 0) {
    content.innerHTML = `<div class="no-results"><h3>No results found</h3><p>Try a different search term</p></div>`;
  }
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function toggleCard(header) {
  const card = header.closest('.command-card');
  card.classList.toggle('collapsed');
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.querySelector('.overlay').classList.toggle('show');
}

// Search
searchInput.addEventListener('input', (e) => {
  renderContent(e.target.value);
});

// Scroll spy for nav highlighting
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      document.querySelectorAll('.nav-item a').forEach(link => link.classList.remove('active'));
      const id = entry.target.id;
      const activeLink = document.querySelector(`.nav-item a[data-target="${id}"]`);
      if (activeLink) activeLink.classList.add('active');
    }
  });
}, { rootMargin: '-20% 0px -60% 0px' });

function observeSections() {
  document.querySelectorAll('.category').forEach(section => observer.observe(section));
}

// Back to top
window.addEventListener('scroll', () => {
  if (window.scrollY > 400) {
    backToTop.classList.add('visible');
  } else {
    backToTop.classList.remove('visible');
  }
});

// Smooth scroll for nav links
navMenu.addEventListener('click', (e) => {
  const link = e.target.closest('a');
  if (link) {
    e.preventDefault();
    const targetId = link.getAttribute('href');
    const target = document.querySelector(targetId);
    if (target) {
      target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      if (window.innerWidth <= 900) toggleSidebar();
    }
  }
});

// Expand all / collapse all keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    searchInput.value = '';
    renderContent('');
    searchInput.blur();
  }
});

// Init
renderNav();
renderContent();
observeSections();
</script>

</html>
